- name: lulc transfer learning playbook
  hosts: gpu_nodes 
  become: true
  vars:
    nvidia_driver: "nvidia-driver-565-server" 
    data_dir: "/data"
    potsdam_url: "https://drive.google.com/file/d/19HCP2QMaQ8FPw6ljMkAEaK4gcwIf8mNW/view?usp=sharing"
    potsdam_dest: "{{ data_dir }}/levir_cd"

    #vaihingen_url: "https://gpcv.whu.edu.cn/data/Building%20change%20detection%20dataset_add.zip"
    #vaihingen_dest: "{{ data_dir }}/whu_cd.zip"

    research_repo_url: "https://github.com/regencode/LULC-Transfer-Learning.git"
    research_repo_dest: "/opt/LULC-Transfer-Learning"

    NVIDIA_CONTAINER_TOOLKIT_VERSION: 1.19.0-1

  tasks: 
  - name: Fix interrupted dpkg installations
    ansible.builtin.command:
      cmd: dpkg --configure -a
    become: true

  - name: Ensure opt/configs directory exists
    ansible.builtin.file:
      path: /opt/configs
      state: directory
      mode: '0755'

  - name: Copy host-specific config file to remote host
    ansible.builtin.copy:
      src: "{{ config_file }}"
      dest: /opt/configs/config.yaml
      mode: '0755'
    become: true

  - name: Ensure apt keyrings directory exists
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'

  - name: Download NVIDIA GPG key
    ansible.builtin.get_url:
      url: https://nvidia.github.io/libnvidia-container/gpgkey
      dest: /etc/apt/keyrings/nvidia-container-toolkit-keyring.asc
      mode: '0644'
    become: true

  - name: Convert NVIDIA key to binary
    ansible.builtin.command:
      cmd: >
        gpg --dearmor
        -o /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg
        /etc/apt/keyrings/nvidia-container-toolkit-keyring.asc
      creates: /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg

  - name: Add NVIDIA repository (deb822 format)
    ansible.builtin.copy:
      dest: /etc/apt/sources.list.d/nvidia-container-toolkit.sources
      mode: '0644'
      content: |
        Types: deb
        URIs: https://nvidia.github.io/libnvidia-container/stable/deb
        Suites: amd64
        Components: main
        Signed-By: /etc/apt/keyrings/nvidia-container-toolkit-keyring.gpg

  - name: Update apt cache
    ansible.builtin.apt:
      update_cache: yes
    become: true

  - name: Install nvidia-container-toolkit
    ansible.builtin.apt:
      name:
        - nvidia-container-toolkit
      state: present
    become: true

  - name: Find nvidia-ctk binary path
    ansible.builtin.shell: find /usr -name "nvidia-ctk" -type f 2>/dev/null | head -1
    register: nvidia_ctk_path
    changed_when: false
    failed_when: false

  - name: Find nvidia-container-cli binary path
    ansible.builtin.shell: which nvidia-container-cli 2>/dev/null || echo ""
    register: nvidia_cli_path
    changed_when: false
    failed_when: false

  - name: Configure docker nvidia runtime (nvidia-ctk)
    ansible.builtin.command:
      cmd: "{{ nvidia_ctk_path.stdout }} runtime configure --runtime=docker"
    become: true
    when: nvidia_ctk_path.stdout | length > 0

  - name: Configure docker nvidia runtime (legacy nvidia-container-cli)
    ansible.builtin.command:
      cmd: nvidia-container-cli --runtime=docker configure
    become: true
    when: nvidia_ctk_path.stdout | length == 0 and nvidia_cli_path.stdout | length > 0

  - name: Download Docker GPG key
    ansible.builtin.get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: '0644'
    become: true

  - name: Add Docker repository (deb822 format)
    ansible.builtin.copy:
      dest: /etc/apt/sources.list.d/docker.sources
      mode: '0644'
      content: |
        Types: deb
        URIs: https://download.docker.com/linux/ubuntu
        Suites: {{ ansible_facts["distribution_release"] }}
        Components: stable
        Signed-By: /etc/apt/keyrings/docker.asc

  - name: Install docker compose drivers
    ansible.builtin.apt:
      name: 
      - docker-ce 
      - docker-ce-cli 
      - containerd.io
      - docker-buildx-plugin 
      - docker-compose-plugin
      state: present
      update_cache: yes
    become: true

  - name: Upgrade all packages to latest
    ansible.builtin.apt:
      upgrade: dist
      update_cache: yes
      state: fixed
    become: true

  - name: Install system (apt) dependencies
    ansible.builtin.apt:
      name: 
        - git
        - python3
        - python3-pip
        - python3-venv
        - ca-certificates
        - curl
        - gnupg2
      state: present
    become: true


  - name: Create python venv
    ansible.builtin.command:
      cmd: python3 -m venv /opt/ml-venv
    args:
      creates: /opt/ml-venv

  - name: Install python dependencies
    ansible.builtin.pip: 
      name:
          - gdown
      state: present
      executable: /opt/ml-venv/bin/pip

  - name: Start docker
    ansible.builtin.systemd:
      name: docker
      state: restarted
      enabled: true

  - name: Ensure /data directory exists
    ansible.builtin.file:
      path: /data
      state: directory
      mode: '0755'

  - name: Download Potsdam dataset
    ansible.builtin.command:
      cmd: gdown "{{ potsdam_url }}" -O "{{ potsdam_dest }}"

  - name: Clone research repo
    ansible.builtin.git:
      repo: "{{ research_repo_url }}"
      dest: "{{ research_repo_dest }}"

  - name: Build docker image
    ansible.builtin.shell: docker compose build --progress=plain
    args:
      chdir: "{{ research_repo_dest }}/docker"
    become: true

  - name: Start docker image
    ansible.builtin.shell: docker compose up -d
    args:
      chdir: "{{ research_repo_dest }}/docker"
    become: true


